<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pitwall · Resultados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E10600; --red-deep:#B00500; --gold:#C99A2E;
  --silver:#AEB4BC; --bronze:#C17C3F;
  --paper:#E7E5DE; --surface:#FAF9F4; --surface-2:#F1EFE7;
  --ink:#16161C; --ink-2:#46453E; --muted:#8C8A7F;
  --line:rgba(20,20,28,.12); --line-2:rgba(20,20,28,.07); --dim:#C9C7BD;
  --shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 14px 34px -22px rgba(20,20,28,.5);
  --grain:rgba(20,20,28,.045);
}
[data-theme="dark"]{
  --paper:#0B0B0F; --surface:#16161D; --surface-2:#1D1D26;
  --ink:#F3F1EA; --ink-2:#C9C7BD; --muted:#76757F;
  --line:rgba(255,255,255,.11); --line-2:rgba(255,255,255,.055); --dim:#3A3A44;
  --red:#FF2118; --red-deep:#FF4438; --gold:#F2BE4B; --silver:#C2C8D0; --bronze:#D08C4F;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 18px 46px -24px rgba(0,0,0,.9);
  --grain:rgba(255,255,255,.03);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;min-height:100vh;
  background-image:radial-gradient(var(--grain) 1px,transparent 1px);background-size:4px 4px;
  transition:background-color .35s ease,color .35s ease;-webkit-font-smoothing:antialiased;}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
a{text-decoration:none;color:inherit}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:16px clamp(16px,5vw,28px);background:color-mix(in srgb,var(--paper) 86%,transparent);
  backdrop-filter:blur(14px) saturate(1.2);-webkit-backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:12px}
.brand-tab{width:6px;height:24px;background:var(--red);border-radius:1px;box-shadow:0 0 14px -2px var(--red)}
.brand-name{font-size:22px;font-weight:900;letter-spacing:.04em}
.topbar-right{display:flex;align-items:center;gap:14px}
.loc{font-size:12px;letter-spacing:.2em;color:var(--muted);font-weight:700}
.loc b{color:var(--gold);font-weight:700}
.theme-toggle{width:40px;height:40px;border-radius:999px;border:1px solid var(--line);display:grid;place-items:center;background:var(--surface);transition:.25s}
.theme-toggle:hover{border-color:var(--ink-2);transform:translateY(-1px)}
.theme-toggle svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2}
.theme-toggle .i-moon{display:none}
[data-theme="dark"] .theme-toggle .i-sun{display:none}
[data-theme="dark"] .theme-toggle .i-moon{display:block}

.app{max-width:640px;margin:0 auto;padding:clamp(14px,4vw,20px) clamp(14px,5vw,20px) 124px}

/* RACE SELECTOR */
.sel-lbl{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sel-lbl::before{content:"";width:14px;height:3px;background:var(--red);border-radius:2px}
.selector{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:18px;-webkit-overflow-scrolling:touch}
.selector::-webkit-scrollbar{display:none}
.rchip{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface);transition:.15s;white-space:nowrap}
.rchip:hover{border-color:var(--ink-2)}
.rchip .rc-fl{width:22px;height:15px;border-radius:3px;overflow:hidden;border:1px solid var(--line)}
.rchip .rc-fl svg{width:100%;height:100%;display:block}
.rchip .rc-r{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em}
.rchip .rc-n{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:-.005em}
.rchip.on{background:var(--ink);border-color:var(--ink)}
.rchip.on .rc-n{color:var(--paper)}
.rchip.on .rc-r{color:color-mix(in srgb,var(--paper) 70%,transparent)}

/* HEADER */
.r-head{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:18px;display:flex;align-items:center;gap:15px}
.r-head .rh-fl{width:52px;height:35px;border-radius:6px;overflow:hidden;border:1px solid var(--line);box-shadow:0 2px 6px -2px rgba(0,0,0,.3);flex:0 0 auto}
.r-head .rh-fl svg{width:100%;height:100%;display:block}
.rh-meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);font-weight:700}
.rh-gp{font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:-.015em;line-height:.95;margin-top:5px}
.rh-loc{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px}

/* PODIUM */
.podium-viz{display:grid;grid-template-columns:1fr 1.15fr 1fr;align-items:end;gap:10px;margin-bottom:8px}
.pcol{display:flex;flex-direction:column;align-items:center}
.pcol .pp-info{text-align:center;margin-bottom:11px}
.pp-fl{width:34px;height:23px;border-radius:4px;overflow:hidden;border:1px solid var(--line);margin:0 auto 8px;box-shadow:0 2px 5px -2px rgba(0,0,0,.3)}
.pp-fl svg{width:100%;height:100%;display:block}
.pp-name{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;line-height:1}
.pp-team{display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:5px}
.pp-team i{width:7px;height:7px;border-radius:2px}
.pbar{width:100%;border-radius:10px 10px 0 0;position:relative;display:flex;align-items:flex-start;justify-content:center;padding-top:12px;overflow:hidden}
.pbar::after{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.18) 1px,transparent 1px);background-size:6px 6px;opacity:.5}
.pbar .pb-pos{font-size:30px;font-weight:900;color:#fff;position:relative;letter-spacing:-.02em;text-shadow:0 1px 8px rgba(0,0,0,.25)}
.p1 .pbar{height:118px;background:linear-gradient(180deg,var(--gold),color-mix(in srgb,var(--gold) 72%,#000))}
.p2 .pbar{height:92px;background:linear-gradient(180deg,var(--silver),color-mix(in srgb,var(--silver) 70%,#000))}
.p3 .pbar{height:74px;background:linear-gradient(180deg,var(--bronze),color-mix(in srgb,var(--bronze) 72%,#000))}
.pp-pts{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#fff;position:relative;margin-top:3px;opacity:.85}
.podium-base{height:5px;background:var(--line);border-radius:3px;margin-bottom:22px}

/* CLASSIFICATION */
.cls-head{display:flex;align-items:center;justify-content:space-between;padding:0 6px 10px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--muted);font-weight:700}
.cls{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.crow{position:relative;display:grid;grid-template-columns:30px 26px 1fr auto auto;align-items:center;gap:12px;padding:12px 15px 12px 12px}
.crow+.crow{border-top:1px solid var(--line-2)}
.crow.fav{background:color-mix(in srgb,var(--red) 7%,var(--surface))}
.crow.fav::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.cpos{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
.cfl{width:26px;height:17px;border-radius:3px;overflow:hidden;border:1px solid var(--line)}
.cfl svg{width:100%;height:100%;display:block}
.cname{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:-.005em;min-width:0}
.cname small{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;margin-left:8px}
.cgap{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-2);text-align:right;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px}
.cgap i{width:3px;height:15px;border-radius:2px}
.cpts{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-align:right;min-width:24px;font-variant-numeric:tabular-nums}
.cpts.zero{color:var(--muted);opacity:.55}

/* NAV (5) */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;padding:0 10px calc(12px + env(safe-area-inset-bottom)) 10px;pointer-events:none}
.nav-inner{pointer-events:auto;width:100%;max-width:520px;display:grid;grid-template-columns:repeat(5,1fr);
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);
  border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 40px -18px rgba(0,0,0,.45),0 2px 0 rgba(255,255,255,.04) inset;overflow:hidden}
.nav-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 2px 12px;color:var(--muted);transition:color .2s}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;font-weight:700}
.nav-item:hover{color:var(--ink-2)}
.nav-item.active{color:var(--red)}
.nav-item.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--red);border-radius:0 0 3px 3px;box-shadow:0 0 10px var(--red)}
.live-pip{position:absolute;top:9px;left:calc(50% + 8px);width:6px;height:6px;border-radius:999px;background:var(--red);animation:pipPulse 1.8s ease-out infinite}
@keyframes pipPulse{0%{box-shadow:0 0 0 0 rgba(225,6,0,.55)}70%{box-shadow:0 0 0 7px rgba(225,6,0,0)}100%{box-shadow:0 0 0 0 rgba(225,6,0,0)}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<script>
/* tema */
(function(){
  var root=document.documentElement, btn=document.getElementById('themeBtn');
  try{var s=localStorage.getItem('pitwall-theme'); if(s) root.setAttribute('data-theme',s);}catch(e){}
  btn.addEventListener('click',function(){
    var n=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',n);try{localStorage.setItem('pitwall-theme',n);}catch(e){}
  });
})();

/* banderas */
var UJ='<rect width="60" height="40" fill="#012169"/><path d="M0,0 60,40 M60,0 0,40" stroke="#fff" stroke-width="8"/><path d="M0,0 60,40 M60,0 0,40" stroke="#C8102E" stroke-width="3.5"/><path d="M30,0V40M0,20H60" stroke="#fff" stroke-width="11"/><path d="M30,0V40M0,20H60" stroke="#C8102E" stroke-width="6.5"/>';
var FLAGS={
  ITA:'<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#009246"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#CE2B37"/></svg>',
  GBR:'<svg viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg>',
  MCO:'<svg viewBox="0 0 3 2"><rect width="3" height="1" fill="#CE1126"/><rect y="1" width="3" height="1" fill="#fff"/></svg>',
  NED:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#21468B"/><rect width="3" height="1.333" fill="#fff"/><rect width="3" height=".667" fill="#AE1C28"/></svg>',
  ESP:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#AA151B"/><rect y=".5" width="3" height="1" fill="#F1BF00"/></svg>',
  FRA:'<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#0055A4"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#EF4135"/></svg>',
  AUS:'<svg viewBox="0 0 60 40"><rect width="60" height="40" fill="#00247D"/><svg x="0" y="0" width="30" height="20" viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg><circle cx="15" cy="31" r="3.4" fill="#fff"/><circle cx="46" cy="11" r="2" fill="#fff"/><circle cx="51" cy="21" r="2" fill="#fff"/><circle cx="43" cy="27" r="2" fill="#fff"/><circle cx="52" cy="33" r="1.5" fill="#fff"/></svg>',
  NZL:'<svg viewBox="0 0 60 40"><rect width="60" height="40" fill="#00247D"/><svg x="0" y="0" width="30" height="20" viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg><circle cx="47" cy="11" r="2" fill="#CC142B"/><circle cx="52" cy="20" r="2.4" fill="#CC142B"/><circle cx="44" cy="26" r="2" fill="#CC142B"/><circle cx="50" cy="33" r="2.4" fill="#CC142B"/></svg>',
  ARG:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#74ACDF"/><rect y=".667" width="3" height=".667" fill="#fff"/><circle cx="1.5" cy="1" r=".2" fill="#F6B40E"/></svg>',
  BRA:'<svg viewBox="0 0 60 42"><rect width="60" height="42" fill="#009C3B"/><polygon points="30,4 56,21 30,38 4,21" fill="#FFDF00"/><circle cx="30" cy="21" r="9" fill="#002776"/></svg>',
  GER:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#FFCE00"/><rect width="3" height="1.333" fill="#DD0000"/><rect width="3" height=".667" fill="#000"/></svg>',
  CAN:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><rect width=".75" height="2" fill="#D52B1E"/><rect x="2.25" width=".75" height="2" fill="#D52B1E"/><polygon points="1.5,.62 1.59,.92 1.88,.92 1.63,1.12 1.72,1.45 1.5,1.25 1.28,1.45 1.37,1.12 1.12,.92 1.41,.92" fill="#D52B1E"/></svg>',
  THA:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#A51931"/><rect y=".333" width="3" height="1.333" fill="#F4F5F8"/><rect y=".667" width="3" height=".667" fill="#2D2A4A"/></svg>'
};
var TEAMS={
  mer:{n:'Mercedes',c:'#00D7B6'}, fer:{n:'Ferrari',c:'#E8002D'}, mcl:{n:'McLaren',c:'#FF8000'},
  rbr:{n:'Red Bull Racing',c:'#3671C6'}, alp:{n:'Alpine',c:'#0093CC'}, rb:{n:'Racing Bulls',c:'#6692FF'},
  haa:{n:'Haas',c:'#9CA3AF'}, wil:{n:'Williams',c:'#1868DB'}, aud:{n:'Audi',c:'#BB0A30'}, ast:{n:'Aston Martin',c:'#229971'}
};
/* roster (id -> piloto) + orden por defecto para rellenar */
var R={
  ver:['Verstappen','NED','rbr'], nor:['Norris','GBR','mcl'], pia:['Piastri','AUS','mcl'],
  lec:['Leclerc','MCO','fer'], ham:['Hamilton','GBR','fer'], ant:['Antonelli','ITA','mer'],
  rus:['Russell','GBR','mer'], gas:['Gasly','FRA','alp'], col:['Colapinto','ARG','alp'],
  law:['Lawson','NZL','rb'], haj:['Hadjar','FRA','rbr'], bea:['Bearman','GBR','haa'],
  sai:['Sainz','ESP','wil'], alo:['Alonso','ESP','ast'], hul:['Hulkenberg','GER','aud'],
  bor:['Bortoleto','BRA','aud'], oco:['Ocon','FRA','haa'], str:['Stroll','CAN','ast'],
  alb:['Albon','THA','wil'], lin:['Lindblad','GBR','rb']
};
var DEFAULT=['ver','nor','pia','lec','ham','ant','rus','gas','col','law','haj','bea','sai','alo','hul','bor','oco','str','alb','lin'];
var PTS=[25,18,15,12,10,8,6,4,2,1];

/* carreras (más reciente primero). top = orden de los primeros; el resto se completa */
var RACES=[
  {r:9, gp:'España', loc:'Circuit de Barcelona-Catalunya · Montmeló', nat:'ESP', laps:66, top:['pia','nor','rus','ant','lec','ham','ver','gas','col','bea']},
  {r:8, gp:'Mónaco', loc:'Circuit de Monaco · Monte Carlo', nat:'MCO', laps:78, top:['lec','ver','nor','ham','ant','pia','rus','sai','gas','alo']},
  {r:7, gp:'Francia', loc:'Circuit Paul Ricard · Le Castellet', nat:'FRA', laps:53, top:['nor','pia','ver','lec','rus','ant','ham','col','bea','law']},
  {r:6, gp:'Italia', loc:'Autodromo Enzo e Dino Ferrari · Imola', nat:'ITA', laps:63, top:['ver','nor','lec','pia','ham','ant','rus','gas','sai','oco']},
  {r:5, gp:'Japón', loc:'Suzuka International · Suzuka', nat:'JPN', laps:53, top:['ver','lec','nor','pia','ham','rus','ant','gas','alo','col']}
];
/* Japón usa bandera propia */
FLAGS.JPN='<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r=".5" fill="#BC002D"/></svg>';

var FAV=(function(){var ids={ant:'ant',rus:'rus',lec:'lec',ham:'ham',nor:'nor',pia:'pia',ver:'ver',gas:'gas',bea:'bea',haj:'haj',col:'col',sai:'sai',bor:'bor'};try{return ids[localStorage.getItem('pitwall-fav')]||'col';}catch(e){return 'col';}})();

function fullOrder(top){
  var o=top.slice();
  DEFAULT.forEach(function(id){ if(o.indexOf(id)<0) o.push(id); });
  return o;
}
function gapTxt(p){
  if(p===0)return '';
  if(p<=5)return '+'+(p*4.3+Math.abs((p*7)%5)*0.7+2.1).toFixed(3)+'s';
  if(p<=11)return '+1 VUELTA';
  if(p<=16)return '+2 VUELTAS';
  return '+3 VUELTAS';
}

function pcol(id,pos){
  var d=R[id],t=TEAMS[d[2]];
  return '<div class="pcol p'+pos+'">'+
    '<div class="pp-info">'+
      '<div class="pp-fl">'+(FLAGS[d[1]]||'')+'</div>'+
      '<div class="pp-name">'+d[0]+'</div>'+
      '<div class="pp-team"><i style="background:'+t.c+'"></i>'+t.n+'</div>'+
    '</div>'+
    '<div class="pbar"><span class="pb-pos">'+pos+'</span></div>'+
    '<div style="background:'+(pos==1?'var(--gold)':pos==2?'var(--silver)':'var(--bronze)')+';width:100%;text-align:center"><span class="pp-pts">+'+PTS[pos-1]+' PTS</span></div>'+
  '</div>';
}

function render(race){
  var order=fullOrder(race.top);
  var html='';
  /* header */
  html+='<div class="r-head">'+
    '<div class="rh-fl">'+(FLAGS[race.nat]||'')+'</div>'+
    '<div><div class="rh-meta">RONDA '+String(race.r).padStart(2,'0')+' · RESULTADO · '+race.laps+' VUELTAS</div>'+
    '<div class="rh-gp">'+race.gp+'</div><div class="rh-loc">'+race.loc+'</div></div>'+
  '</div>';
  /* podium */
  html+='<div class="podium-viz">'+pcol(order[1],2)+pcol(order[0],1)+pcol(order[2],3)+'</div>';
  html+='<div class="podium-base"></div>';
  /* classification 4+ */
  html+='<div class="cls-head"><span>CLASIFICACIÓN</span><span>DIF. / PTS</span></div>';
  html+='<div class="cls">';
  for(var i=3;i<order.length;i++){
    var id=order[i], d=R[id], t=TEAMS[d[2]], pts=PTS[i]||0;
    html+='<div class="crow'+(id===FAV?' fav':'')+'">'+
      '<span class="cpos">'+String(i+1).padStart(2,'0')+'</span>'+
      '<span class="cfl">'+(FLAGS[d[1]]||'')+'</span>'+
      '<span class="cname">'+d[0]+'<small>'+t.n+'</small></span>'+
      '<span class="cgap"><i style="background:'+t.c+'"></i>'+gapTxt(i)+'</span>'+
      '<span class="cpts'+(pts===0?' zero':'')+'">'+pts+'</span>'+
    '</div>';
  }
  html+='</div>';
  document.getElementById('result').innerHTML=html;
}

/* selector */
(function(){
  var sel=document.getElementById('selector'), cur=0;
  function paint(){
    sel.innerHTML=RACES.map(function(rc,i){
      return '<button class="rchip'+(i===cur?' on':'')+'" data-i="'+i+'">'+
        '<span class="rc-fl">'+(FLAGS[rc.nat]||'')+'</span>'+
        '<span class="rc-r">R'+String(rc.r).padStart(2,'0')+'</span>'+
        '<span class="rc-n">'+rc.gp+'</span>'+
      '</button>';
    }).join('');
  }
  sel.addEventListener('click',function(e){
    var b=e.target.closest('.rchip'); if(!b)return;
    cur=+b.dataset.i; paint(); render(RACES[cur]);
  });
  paint(); render(RACES[0]);
})();
</script>
<script src="pitwall-platform.js"></script>
</body>
</html>
