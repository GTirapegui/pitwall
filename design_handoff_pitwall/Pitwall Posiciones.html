<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pitwall · Posiciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E10600; --red-deep:#B00500; --gold:#C99A2E;
  --paper:#E7E5DE; --surface:#FAF9F4; --surface-2:#F1EFE7;
  --ink:#16161C; --ink-2:#46453E; --muted:#8C8A7F;
  --line:rgba(20,20,28,.12); --line-2:rgba(20,20,28,.07); --dim:#C9C7BD;
  --shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 14px 34px -22px rgba(20,20,28,.5);
  --grain:rgba(20,20,28,.045);
}
[data-theme="dark"]{
  --paper:#0B0B0F; --surface:#16161D; --surface-2:#1D1D26;
  --ink:#F3F1EA; --ink-2:#C9C7BD; --muted:#76757F;
  --line:rgba(255,255,255,.11); --line-2:rgba(255,255,255,.055); --dim:#3A3A44;
  --red:#FF2118; --red-deep:#FF4438; --gold:#F2BE4B;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 18px 46px -24px rgba(0,0,0,.9);
  --grain:rgba(255,255,255,.03);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;min-height:100vh;
  background-image:radial-gradient(var(--grain) 1px,transparent 1px);background-size:4px 4px;
  transition:background-color .35s ease,color .35s ease;-webkit-font-smoothing:antialiased;}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
a{text-decoration:none;color:inherit}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:16px clamp(16px,5vw,28px);background:color-mix(in srgb,var(--paper) 86%,transparent);
  backdrop-filter:blur(14px) saturate(1.2);-webkit-backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:12px}
.brand-tab{width:6px;height:24px;background:var(--red);border-radius:1px;box-shadow:0 0 14px -2px var(--red)}
.brand-name{font-size:22px;font-weight:900;letter-spacing:.04em}
.topbar-right{display:flex;align-items:center;gap:14px}
.loc{font-size:12px;letter-spacing:.2em;color:var(--muted);font-weight:700}
.loc b{color:var(--gold);font-weight:700}
.theme-toggle{width:40px;height:40px;border-radius:999px;border:1px solid var(--line);display:grid;place-items:center;background:var(--surface);transition:.25s}
.theme-toggle:hover{border-color:var(--ink-2);transform:translateY(-1px)}
.theme-toggle svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2}
.theme-toggle .i-moon{display:none}
[data-theme="dark"] .theme-toggle .i-sun{display:none}
[data-theme="dark"] .theme-toggle .i-moon{display:block}

.app{max-width:680px;margin:0 auto;padding:clamp(14px,4vw,22px) clamp(12px,5vw,20px) 124px}

/* SEGMENTED TABS */
.segment{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:22px}
.seg-btn{padding:12px 8px;border-radius:9px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:.16em;color:var(--muted);transition:background .25s ease,color .25s ease,box-shadow .25s ease;text-align:center}
.seg-btn.on{background:var(--red);color:#fff;box-shadow:0 6px 16px -8px var(--red)}

.list-head{display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);font-weight:700}
.list-head .pts-h{letter-spacing:.18em}

.board{display:flex;flex-direction:column}
.board[hidden]{display:none}

/* ROW (driver) */
.row{position:relative;display:grid;align-items:center;gap:13px;padding:14px 14px;border-radius:12px;transition:background .2s}
.row+.row{border-top:1px solid var(--line-2)}
.row.d{grid-template-columns:30px 30px 1fr auto}
.row.c{grid-template-columns:30px 7px 1fr auto}
.row:hover{background:var(--surface)}
.pos{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;text-align:center}
.flag{width:30px;height:20px;border-radius:3px;overflow:hidden;border:1px solid var(--line);box-shadow:0 1px 3px -1px rgba(0,0,0,.35);justify-self:center}
.flag svg{width:100%;height:100%;display:block}
.cbar{width:7px;height:30px;border-radius:3px;justify-self:center}

.main{min-width:0}
.name{display:flex;flex-direction:column;line-height:1.05}
.first{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--muted)}
.last{font-size:21px;font-weight:800;letter-spacing:-.01em;text-transform:uppercase}
.cname{font-size:21px;font-weight:800;letter-spacing:-.005em;text-transform:uppercase;line-height:1}
.team,.cdrivers{display:flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:5px}
.team i{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cdrivers{letter-spacing:.08em;text-transform:uppercase;margin-top:6px}

.bar{height:4px;border-radius:3px;background:var(--line-2);margin-top:9px;overflow:hidden;max-width:240px}
.bar span{display:block;height:100%;border-radius:3px}

.pts{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-align:right;align-self:start;padding-top:6px}
.pts small{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--muted);display:block;margin-top:2px}

/* LEADER */
.row.is-leader{background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 20%,var(--surface)),transparent 75%);border-radius:12px}
.row.is-leader::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--gold);border-radius:3px;box-shadow:0 0 12px var(--gold)}
.row.is-leader .pos,.row.is-leader .pts{color:var(--gold)}
.lead-tag{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--gold);
  border:1px solid color-mix(in srgb,var(--gold) 45%,transparent);border-radius:6px;padding:2px 7px;margin-top:8px;width:max-content}
.lead-tag::before{content:"";width:5px;height:5px;border-radius:999px;background:var(--gold)}

/* NAV */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;padding:0 12px calc(12px + env(safe-area-inset-bottom)) 12px;pointer-events:none}
.nav-inner{pointer-events:auto;width:100%;max-width:520px;display:grid;grid-template-columns:repeat(5,1fr);
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);
  border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 40px -18px rgba(0,0,0,.45),0 2px 0 rgba(255,255,255,.04) inset;overflow:hidden}
.nav-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 2px 12px;color:var(--muted);transition:color .2s}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;font-weight:700}
.nav-item:hover{color:var(--ink-2)}
.nav-item.active{color:var(--red)}
.nav-item.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--red);border-radius:0 0 3px 3px;box-shadow:0 0 10px var(--red)}
.live-pip{position:absolute;top:9px;left:calc(50% + 8px);width:6px;height:6px;border-radius:999px;background:var(--red);animation:pipPulse 1.8s ease-out infinite}
@keyframes pipPulse{0%{box-shadow:0 0 0 0 rgba(225,6,0,.55)}70%{box-shadow:0 0 0 7px rgba(225,6,0,0)}100%{box-shadow:0 0 0 0 rgba(225,6,0,0)}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<link rel="stylesheet" href="pitwall-platform.css">
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="brand-tab"></span><span class="brand-name">PITWALL</span></div>
  <div class="topbar-right">
    <span class="loc mono">SANTIAGO <b>2026</b></span>
    <button class="theme-toggle" id="themeBtn" aria-label="Cambiar tema">
      <svg class="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="i-moon" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
    </button>
  </div>
</header>

<main class="app">
  <div class="segment" id="segment" data-tab="drv">
    <button class="seg-btn on" data-go="drv">PILOTOS</button>
    <button class="seg-btn" data-go="con">CONSTRUCTORES</button>
  </div>

  <div class="list-head"><span id="boardTitle">CAMPEONATO DE PILOTOS</span><span class="pts-h">PTS</span></div>

  <div class="board" id="boardDrv"></div>
  <div class="board" id="boardCon" hidden></div>
</main>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-item" href="Pitwall Home.html">
      <svg viewBox="0 0 24 24"><path d="M4 15a8 8 0 0 1 16 0"/><path d="M12 15l4.2-4.6"/><circle cx="12" cy="15" r="1.4" fill="currentColor" stroke="none"/><path d="M3 19h18"/></svg>
      <span>INICIO</span>
    </a>
    <a class="nav-item" href="Pitwall Calendario.html">
      <svg viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/><circle cx="8" cy="13.5" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="13.5" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="13.5" r="1" fill="currentColor" stroke="none"/></svg>
      <span>CALENDARIO</span>
    </a>
    <a class="nav-item active" href="#">
      <svg viewBox="0 0 24 24"><path d="M5 20V11M12 20V4M19 20v-6"/><path d="M3 20h18"/></svg>
      <span>POSICIONES</span>
    </a>
    <a class="nav-item" href="Pitwall Resultados.html">
      <svg viewBox="0 0 24 24"><path d="M7 4h10v3a5 5 0 0 1-10 0z"/><path d="M7 5H4.5v1.5A2.5 2.5 0 0 0 7 9M17 5h2.5v1.5A2.5 2.5 0 0 1 17 9"/><path d="M12 12v3M9 20h6M10 20l.5-3h3l.5 3"/></svg>
      <span>RESULTADOS</span>
    </a>
    <a class="nav-item" href="Pitwall En Vivo.html">
      <span class="live-pip"></span>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/><path d="M7.8 7.8a6 6 0 0 0 0 8.4M16.2 7.8a6 6 0 0 1 0 8.4M5 5a9.5 9.5 0 0 0 0 14M19 5a9.5 9.5 0 0 1 0 14"/></svg>
      <span>EN VIVO</span>
    </a>
  </div>
</nav>

<script>
/* ===== Tema ===== */
(function(){
  var root=document.documentElement, btn=document.getElementById('themeBtn');
  try{var s=localStorage.getItem('pitwall-theme'); if(s) root.setAttribute('data-theme',s);}catch(e){}
  btn.addEventListener('click',function(){
    var n=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',n);try{localStorage.setItem('pitwall-theme',n);}catch(e){}
  });
})();

/* ===== Banderas ===== */
var UJ='<rect width="60" height="40" fill="#012169"/><path d="M0,0 60,40 M60,0 0,40" stroke="#fff" stroke-width="8"/><path d="M0,0 60,40 M60,0 0,40" stroke="#C8102E" stroke-width="3.5"/><path d="M30,0V40M0,20H60" stroke="#fff" stroke-width="11"/><path d="M30,0V40M0,20H60" stroke="#C8102E" stroke-width="6.5"/>';
var FLAGS={
  ITA:'<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#009246"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#CE2B37"/></svg>',
  GBR:'<svg viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg>',
  MCO:'<svg viewBox="0 0 3 2"><rect width="3" height="1" fill="#CE1126"/><rect y="1" width="3" height="1" fill="#fff"/></svg>',
  NED:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#21468B"/><rect width="3" height="1.333" fill="#fff"/><rect width="3" height=".667" fill="#AE1C28"/></svg>',
  ESP:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#AA151B"/><rect y=".5" width="3" height="1" fill="#F1BF00"/></svg>',
  FRA:'<svg viewBox="0 0 3 2"><rect width="1" height="2" fill="#0055A4"/><rect x="1" width="1" height="2" fill="#fff"/><rect x="2" width="1" height="2" fill="#EF4135"/></svg>',
  AUS:'<svg viewBox="0 0 60 40"><rect width="60" height="40" fill="#00247D"/><svg x="0" y="0" width="30" height="20" viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg><circle cx="15" cy="31" r="3.4" fill="#fff"/><circle cx="46" cy="11" r="2" fill="#fff"/><circle cx="51" cy="21" r="2" fill="#fff"/><circle cx="43" cy="27" r="2" fill="#fff"/><circle cx="52" cy="33" r="1.5" fill="#fff"/></svg>',
  NZL:'<svg viewBox="0 0 60 40"><rect width="60" height="40" fill="#00247D"/><svg x="0" y="0" width="30" height="20" viewBox="0 0 60 40" preserveAspectRatio="none">'+UJ+'</svg><circle cx="47" cy="11" r="2" fill="#CC142B"/><circle cx="52" cy="20" r="2.4" fill="#CC142B"/><circle cx="44" cy="26" r="2" fill="#CC142B"/><circle cx="50" cy="33" r="2.4" fill="#CC142B"/></svg>',
  ARG:'<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#74ACDF"/><rect y=".667" width="3" height=".667" fill="#fff"/><circle cx="1.5" cy="1" r=".2" fill="#F6B40E"/></svg>',
  BRA:'<svg viewBox="0 0 60 42"><rect width="60" height="42" fill="#009C3B"/><polygon points="30,4 56,21 30,38 4,21" fill="#FFDF00"/><circle cx="30" cy="21" r="9" fill="#002776"/></svg>'
};

/* ===== Equipos ===== */
var TEAMS={
  mer:{name:'Mercedes',c:'#00D7B6'}, fer:{name:'Ferrari',c:'#E8002D'}, mcl:{name:'McLaren',c:'#FF8000'},
  rbr:{name:'Red Bull Racing',c:'#3671C6'}, alp:{name:'Alpine',c:'#0093CC'}, rb:{name:'Racing Bulls',c:'#6692FF'},
  haa:{name:'Haas F1 Team',c:'#9CA3AF'}, wil:{name:'Williams',c:'#1868DB'}, aud:{name:'Audi',c:'#BB0A30'},
  ast:{name:'Aston Martin',c:'#229971'}, cad:{name:'Cadillac',c:'#B99A5B'}
};

/* ===== Datos pilotos ===== */
var DRIVERS=[
  {first:'Kimi',last:'Antonelli',nat:'ITA',team:'mer',pts:131},
  {first:'George',last:'Russell',nat:'GBR',team:'mer',pts:88},
  {first:'Charles',last:'Leclerc',nat:'MCO',team:'fer',pts:75},
  {first:'Lewis',last:'Hamilton',nat:'GBR',team:'fer',pts:72},
  {first:'Lando',last:'Norris',nat:'GBR',team:'mcl',pts:58},
  {first:'Oscar',last:'Piastri',nat:'AUS',team:'mcl',pts:48},
  {first:'Max',last:'Verstappen',nat:'NED',team:'rbr',pts:43},
  {first:'Pierre',last:'Gasly',nat:'FRA',team:'alp',pts:20},
  {first:'Oliver',last:'Bearman',nat:'GBR',team:'haa',pts:18},
  {first:'Liam',last:'Lawson',nat:'NZL',team:'rb',pts:16},
  {first:'Isack',last:'Hadjar',nat:'FRA',team:'rbr',pts:14},
  {first:'Franco',last:'Colapinto',nat:'ARG',team:'alp',pts:13},
  {first:'Carlos',last:'Sainz',nat:'ESP',team:'wil',pts:6},
  {first:'Arvid',last:'Lindblad',nat:'GBR',team:'rb',pts:5},
  {first:'Gabriel',last:'Bortoleto',nat:'BRA',team:'aud',pts:2}
];
var CONSTRUCTORS=[
  {team:'mer',drivers:'ANT · RUS',pts:219},
  {team:'fer',drivers:'LEC · HAM',pts:147},
  {team:'mcl',drivers:'NOR · PIA',pts:106},
  {team:'rbr',drivers:'VER · HAD',pts:57},
  {team:'alp',drivers:'GAS · COL',pts:33},
  {team:'rb',drivers:'LAW · LIN',pts:21},
  {team:'haa',drivers:'BEA · OCO',pts:19},
  {team:'wil',drivers:'SAI · ALB',pts:7},
  {team:'aud',drivers:'BOR · HUL',pts:2},
  {team:'ast',drivers:'ALO · STR',pts:0},
  {team:'cad',drivers:'PER · BOT',pts:0}
];

function pad(n){return String(n).padStart(2,'0');}

/* render pilotos */
(function(){
  var max=DRIVERS[0].pts, html='';
  DRIVERS.forEach(function(d,i){
    var t=TEAMS[d.team], w=Math.max(4,d.pts/max*100), lead=i===0;
    html+='<div class="row d'+(lead?' is-leader':'')+'">'+
      '<span class="pos">'+pad(i+1)+'</span>'+
      '<span class="flag">'+(FLAGS[d.nat]||'')+'</span>'+
      '<div class="main">'+
        '<div class="name"><span class="first">'+d.first+'</span><span class="last">'+d.last+'</span></div>'+
        (lead?'<span class="lead-tag">LÍDER DEL MUNDIAL</span>':'<div class="team"><i style="background:'+t.c+'"></i>'+t.name+'</div>')+
        '<div class="bar"><span style="width:'+w+'%;background:'+t.c+'"></span></div>'+
      '</div>'+
      '<span class="pts">'+d.pts+'<small>PTS</small></span>'+
    '</div>';
  });
  document.getElementById('boardDrv').innerHTML=html;
})();

/* render constructores */
(function(){
  var max=CONSTRUCTORS[0].pts, html='';
  CONSTRUCTORS.forEach(function(c,i){
    var t=TEAMS[c.team], w=Math.max(3,c.pts/max*100), lead=i===0;
    html+='<div class="row c'+(lead?' is-leader':'')+'">'+
      '<span class="pos">'+pad(i+1)+'</span>'+
      '<span class="cbar" style="background:'+t.c+'"></span>'+
      '<div class="main">'+
        '<div class="cname">'+t.name+'</div>'+
        '<div class="cdrivers">'+c.drivers+'</div>'+
        '<div class="bar"><span style="width:'+w+'%;background:'+t.c+'"></span></div>'+
      '</div>'+
      '<span class="pts">'+c.pts+'<small>PTS</small></span>'+
    '</div>';
  });
  document.getElementById('boardCon').innerHTML=html;
})();

/* tabs */
(function(){
  var seg=document.getElementById('segment'),
      bDrv=document.getElementById('boardDrv'), bCon=document.getElementById('boardCon'),
      title=document.getElementById('boardTitle');
  function paint(go){
    var drv=go==='drv';
    seg.innerHTML='<button class="seg-btn'+(drv?' on':'')+'" data-go="drv">PILOTOS</button>'+
                  '<button class="seg-btn'+(drv?'':' on')+'" data-go="con">CONSTRUCTORES</button>';
    bDrv.hidden=!drv; bCon.hidden=drv;
    title.textContent=drv?'CAMPEONATO DE PILOTOS':'CAMPEONATO DE CONSTRUCTORES';
  }
  seg.addEventListener('click',function(e){
    var b=e.target.closest('.seg-btn'); if(!b)return;
    paint(b.dataset.go);
  });
  paint('drv');
})();
</script>
<script src="pitwall-platform.js"></script>
</body>
</html>
